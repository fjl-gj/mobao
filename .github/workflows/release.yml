name: Release Builder

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      platforms:
        required: false
        type: string
        default: '["ubuntu-latest","macos-latest","windows-latest","android"]'

jobs:
  # ---------- 按需调用桌面构建（并上传临时 artifact） ----------
  desktop-ubuntu:
    if: contains(fromJson(inputs.platforms), 'ubuntu-latest')
    uses: ./.github/workflows/_build-desktop.yml
    with:
      upload-artifact: true
      tag: ${{ inputs.tag }}
      platforms: '["ubuntu-latest"]'

  desktop-macos:
    if: contains(fromJson(inputs.platforms), 'macos-latest')
    uses: ./.github/workflows/_build-desktop.yml
    with:
      upload-artifact: true
      tag: ${{ inputs.tag }}
      platforms: '["macos-latest"]'

  desktop-windows:
    if: contains(fromJson(inputs.platforms), 'windows-latest')
    uses: ./.github/workflows/_build-desktop.yml
    with:
      upload-artifact: true
      tag: ${{ inputs.tag }}
      platforms: '["windows-latest"]'

  # ---------- 调用移动端构建 ----------
  mobile:
    if: contains(fromJson(inputs.platforms), 'android')
    uses: ./.github/workflows/_build-mobile.yml
    with:
      upload-artifact: true
      tag: ${{ inputs.tag }}
      platforms: '["android"]'

  # ---------- 收集产物并发布到 GitHub Release ----------
  publish:
    needs: [desktop-ubuntu, desktop-macos, desktop-windows, mobile]
    if: |
      always() &&
      (
        needs.desktop-ubuntu.result == 'success' ||
        needs.desktop-macos.result == 'success' ||
        needs.desktop-windows.result == 'success' ||
        needs.mobile.result == 'success'
      )
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      # 合并下载所有桌面平台的安装包
      - name: 下载桌面产物
        if: |
          needs.desktop-ubuntu.result == 'success' ||
          needs.desktop-macos.result == 'success' ||
          needs.desktop-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-bundle-*
          path: release-files
          merge-multiple: true

      # 单独下载 Android APK
      - name: 下载 Android APK
        if: needs.mobile.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: mobile-apk
          path: release-files/apk

      - name: 统一 Release 资产文件名
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG#v}"
          mkdir -p release-assets

          DEB=$(find release-files -name '*.deb' -type f | sort | head -n 1)
          APPIMAGE=$(find release-files -name '*.AppImage' -type f | sort | head -n 1)
          DMG=$(find release-files -name '*.dmg' -type f | sort | head -n 1)
          EXE=$(find release-files -name '*.exe' -type f | sort | head -n 1)
          APK=$(find release-files -name '*.apk' -type f | sort | head -n 1)

          if [ -n "$DEB" ]; then
            cp "$DEB" "release-assets/MoBao_x86_64_v${VERSION}.deb"
          fi
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "release-assets/MoBao_v${VERSION}.AppImage"
          fi
          if [ -n "$DMG" ]; then
            cp "$DMG" "release-assets/MoBao_aarch64_v${VERSION}.dmg"
          fi
          if [ -n "$EXE" ]; then
            cp "$EXE" "release-assets/MoBao_x86_64_v${VERSION}.exe"
          fi
          if [ -n "$APK" ]; then
            cp "$APK" "release-assets/MoBao_v${VERSION}.apk"
          fi

          ls -la release-assets

      # 创建或补充 Release，只上传本次构建出来的安装包
      - name: 创建或补充 GitHub Release
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          shopt -s globstar nullglob
          FILES=()
          for file in release-assets/*; do
            if [ -f "$file" ]; then
              FILES+=("$file")
            fi
          done

          if [ ${#FILES[@]} -eq 0 ]; then
            echo "No install packages found."
            exit 1
          fi

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            RELEASE_ID=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json databaseId --jq '.databaseId')
            gh release upload "$TAG" "${FILES[@]}" --repo "$GITHUB_REPOSITORY" --clobber
            gh api \
              --method PATCH \
              "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" \
              -F draft=false \
              -F prerelease=false >/dev/null
          fi

          if ! gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$TAG" "${FILES[@]}" --repo "$GITHUB_REPOSITORY" --generate-notes
          fi