name: Release Builder

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  # ---------- 调用桌面构建（并上传临时 artifact） ----------
  desktop:
    uses: ./.github/workflows/_build-desktop.yml
    with:
      upload-artifact: true
      tag: ${{ inputs.tag }}

  # ---------- 调用移动端构建 ----------
  mobile:
    uses: ./.github/workflows/_build-mobile.yml
    with:
      upload-artifact: true
      tag: ${{ inputs.tag }}

  # ---------- 收集产物并发布到 GitHub Release ----------
  publish:
    needs: [desktop, mobile]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # 合并下载所有桌面平台的安装包
      - name: 下载桌面产物
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-bundle-*
          path: release-files
          merge-multiple: true

      # 单独下载 Android APK
      - name: 下载 Android APK
        uses: actions/download-artifact@v4
        with:
          name: mobile-apk
          path: release-files/apk

      # 创建 Release，只上传确定的安装包格式
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            release-files/*.deb
            release-files/*.AppImage
            release-files/*.dmg
            release-files/*.exe
            release-files/apk/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true