name: Release Build

on:
  push:
    tags: ['v*']

jobs:
  desktop-release:
    name: 桌面发布 - ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable

      - name: 安装 Linux 依赖
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: yarn install --frozen-lockfile

      - name: 同步版本号到 Tauri 配置
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $TAG"
          tmp=$(mktemp)
          jq --arg v "$TAG" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json

      - name: 构建桌面应用
        run: npx tauri build --ci

      - name: 上传 Release 资产
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            src-tauri/target/release/bundle/**/*
          draft: false
          prerelease: false
          generate_release_notes: true

  android-release:
    name: Android 发布
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'
      - name: 配置环境变量
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
      - run: yarn install --frozen-lockfile
      - name: 初始化 Android 项目
        run: npx tauri android init --ci
      - name: 构建 Android APK
        run: npx tauri android build --debug
      - uses: actions/upload-artifact@v4
        with:
          name: mobao-android-release
          path: src-tauri/gen/android/app/build/outputs/apk/debug/app-debug.apk