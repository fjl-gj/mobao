name: Reusable Mobile Build

on:
  workflow_call:
    inputs:
      upload-artifact:
        required: false
        type: boolean
        default: false
      tag:
        required: false
        type: string
        default: ''
      platforms:
        required: false
        type: string
        default: '["android"]'

jobs:
  android:
    name: Android
    if: contains(fromJson(inputs.platforms), 'android')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 缓存 yarn
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}

      - name: 安装依赖
        run: yarn install --frozen-lockfile

      - name: Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 获取周数（定期刷新缓存）
        id: week
        run: echo "WEEK=$(date +%Y-W%U)" >> $GITHUB_OUTPUT

      - name: 缓存 Android SDK
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk
          key: android-sdk-${{ runner.os }}-${{ steps.week.outputs.WEEK }}-${{ hashFiles('src-tauri/gen/android/build.gradle.kts') }}

      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'

      - name: 配置环境变量
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV

      - name: 初始化 Android 项目
        run: npx tauri android init --ci

      - name: 缓存 Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ steps.week.outputs.WEEK }}-${{ hashFiles('src-tauri/gen/android/**/*.gradle.kts', 'src-tauri/gen/android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: 构建 Android APK
        run: npx tauri android build --debug

      # 修正后的 APK 上传路径
      - name: 上传 APK（发布时）
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/app-universal-debug.apk

