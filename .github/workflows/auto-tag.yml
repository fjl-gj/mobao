name: Auto Tag (Manual)

on:
  workflow_dispatch:   # 允许手动触发
  workflow_call:

permissions:
  contents: write

jobs:
  desktop:
    uses: ./.github/workflows/_build-desktop.yml
  mobile:
    uses: ./.github/workflows/_build-mobile.yml

  create-tag:
    name: 创建 tag
    needs: [desktop, mobile]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.create.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 调试 - 显示 version.json 内容
        run: cat version.json

      - name: 读取版本号并创建 tag
        id: create
        shell: bash
        run: |
          VERSION=$(jq -r '.version' version.json)
          TAG="v$VERSION"
          echo "Read version: $VERSION, prepared tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          TAG_EXISTS=false
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG already exists, skipping."
            TAG_EXISTS=true
          fi

          if [ "$TAG_EXISTS" = "false" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi