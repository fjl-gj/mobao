name: Reusable Desktop Build

on:
  workflow_call:
    inputs:
      upload-artifact:
        required: false
        type: boolean
        default: false
      tag:
        required: false
        type: string
        default: ''

jobs:
  build-desktop:
    name: 桌面 - ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # 强制使用 Node.js 24
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 缓存前端依赖
      - name: 缓存 yarn
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}

      - name: 安装依赖
        run: yarn install --frozen-lockfile

      # 👇 改用 rust-cache 代替 sccache
      - name: Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 设置 Rust 工具链
      - uses: dtolnay/rust-toolchain@stable

      # 安装 Linux 依赖
      - name: 安装 Linux 依赖
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: 构建桌面应用
        run: npx tauri build --ci

      # 当发布时，将产物上传为临时 Artifact，供 release.yml 下载
      - name: 上传构建产物（仅发布用）
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundle-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/**/*