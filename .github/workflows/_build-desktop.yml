name: Reusable Desktop Build

on:
  workflow_call:
    inputs:
      upload-artifact:
        required: false
        type: boolean
        default: false
      tag:
        required: false
        type: string
        default: ''
      platforms:
        required: false
        type: string
        default: '["ubuntu-latest","macos-latest","windows-latest"]'

jobs:
  build-desktop:
    name: 桌面 - ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(inputs.platforms) }}
    runs-on: ${{ matrix.platform }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TAURI_APPLE_SIGNING_IDENTITY: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 同步版本号（发布时）
        if: inputs.tag != ''
        shell: bash
        run: |
          TAG="${{ inputs.tag }}"
          VERSION=${TAG#v}
          echo "Setting version to $VERSION"
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json

      - name: 缓存 yarn
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('yarn.lock') }}

      - name: 安装依赖
        run: yarn install --frozen-lockfile

      - name: Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: dtolnay/rust-toolchain@stable

      # ---------- 平台专属打包环境 ----------
      - name: 安装 Linux 系统依赖及打包工具
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf-2.0-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            file \
            dpkg-dev \
            fakeroot
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /usr/local/bin/appimagetool
          chmod +x /usr/local/bin/appimagetool

      - name: 选择打包格式
        id: bundle
        shell: bash
        run: |
          PLATFORM="${{ matrix.platform }}"
          BUNDLES=""
          if [ "$PLATFORM" = "ubuntu-latest" ]; then
            BUNDLES="deb,appimage"
          fi
          if [ "$PLATFORM" = "macos-latest" ]; then
            BUNDLES="dmg"
          fi
          if [ "$PLATFORM" = "windows-latest" ]; then
            BUNDLES="nsis"
          fi
          echo "bundles=$BUNDLES" >> "$GITHUB_OUTPUT"

      - name: 构建桌面应用（生成指定安装包）
        run: npx tauri build --ci --bundles ${{ steps.bundle.outputs.bundles }}

      # 调试用（可保留）
      - name: 列出产物目录
        run: ls -R src-tauri/target/release/bundle/ || echo "No bundle directory"

      # 发布时上传安装包作为临时 artifact
      - name: 上传构建产物（发布用）
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-bundle-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/**/*
