name: 全平台编译墨宝
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ========== 桌面三平台 ==========
  build-desktop:
    name: 桌面端 - ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
      - name: 安装 Linux 依赖
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - run: yarn install --frozen-lockfile
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: '墨宝 v__VERSION__'
          releaseBody: '自动构建的墨宝小说编辑器'
          releaseDraft: true
          prerelease: false

  # ========== Android ==========
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'
      - name: 配置环境变量
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
      - run: yarn install --frozen-lockfile

      # 自动初始化 Android 项目（代替本地运行 npx tauri android init）
      - name: 初始化 Tauri Android 项目
        run: npx tauri android init --ci --app-name "墨宝" --app-id "com.mobao.app" --skip-target-check

      - name: 构建 Android Debug APK
        run: npx tauri android build --debug

      - uses: actions/upload-artifact@v4
        with:
          name: mobao-android
          path: src-tauri/gen/android/app/build/outputs/apk/debug/app-debug.apk

  # ========== iOS ==========
  build-ios:
    name: iOS（未签名）
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, aarch64-apple-ios-sim
      - run: yarn install --frozen-lockfile

      # 自动初始化 iOS 项目（代替本地运行 npx tauri ios init）
      - name: 初始化 Tauri iOS 项目
        run: npx tauri ios init --ci --app-name "墨宝" --app-id "com.mobao.app" --skip-target-check

      - name: 构建 iOS 未签名 IPA
        run: npx tauri ios build --no-sign

      - uses: actions/upload-artifact@v4
        with:
          name: mobao-ios
          path: src-tauri/gen/apple/build/*.ipa
