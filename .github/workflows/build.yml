name: 全平台编译墨宝
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ========== 桌面三平台 ==========
  build-desktop:
    name: 桌面端 - ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable

      - name: 安装 Linux 依赖
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - run: yarn install --frozen-lockfile

      - name: 同步版本号到 Tauri 配置
        run: |
          VERSION=$(jq -r '.version' version.json)
          tmp=$(mktemp)
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > "$tmp" && mv "$tmp" src-tauri/tauri.conf.json

      - name: 构建桌面应用
        run: npx tauri build --ci

      - uses: actions/upload-artifact@v4
        with:
          name: mobao-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/**/*

      - name: 上传到 Release（仅 tag 触发）
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            src-tauri/target/release/bundle/**/*
          draft: true
          prerelease: false
          generate_release_notes: true

  # ========== Android ==========
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: 安装 Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'
      - name: 配置环境变量
        run: |
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.0.12077973" >> $GITHUB_ENV
      - run: yarn install --frozen-lockfile
      - name: 初始化 Android 项目
        run: npx tauri android init --ci
      - name: 构建 Android APK
        run: npx tauri android build --debug
      - uses: actions/upload-artifact@v4
        with:
          name: mobao-android
          path: src-tauri/gen/android/app/build/outputs/apk/debug/app-debug.apk

