name: CI

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ========== 检查版本与 tag 状态 ==========
  check-version:
    name: 检查版本状态
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: ${{ steps.version.outputs.TAG }}
      changed: ${{ steps.filter.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            version:
              - 'version.json'

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: 检查远程 tag 是否存在
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          EXISTS=false
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG exists."
            EXISTS=true
          fi
          if [ "$EXISTS" = "false" ]; then
            echo "Tag $TAG does NOT exist."
          fi
          echo "exists=$EXISTS" >> $GITHUB_OUTPUT

  # ========== 第一个 if：tag 存在时，只做日常构建 ==========
  daily-build:
    name: 日常编译检查
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'true'
    uses: ./.github/workflows/_build-desktop.yml

  daily-mobile:
    name: 日常移动端检查
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'true'
    uses: ./.github/workflows/_build-mobile.yml

  # ========== 第一个 if：tag 不存在时，触发 auto-tag 流程 ==========
  auto_tag:
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false'
    uses: ./.github/workflows/auto-tag.yml
    secrets: inherit

  # ========== 第二个 if：必须等待第一个 if 的对应分支完成后，再检查发布状态 ==========
  check-release:
    name: 检查发布状态
    needs: [check-version, daily-build, daily-mobile, auto_tag]
    if: |
      always() &&
      (
        (
          needs.check-version.outputs.tag_exists == 'true' &&
          needs.daily-build.result == 'success' &&
          needs.daily-mobile.result == 'success'
        ) ||
        needs.auto_tag.result == 'success'
      )
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      missing_platforms: ${{ steps.check.outputs.missing }}
      release_exists: ${{ steps.check.outputs.release_exists }}
      release_published: ${{ steps.check.outputs.release_published }}
    steps:
      - name: 检查 Release 资产完整性
        id: check
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"

          RELEASE_EXISTS=false
          RELEASE_PUBLISHED=false
          IS_DRAFT=true
          PUBLISHED_AT=""
          ASSETS=""
          RELEASE_JSON=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json assets,isDraft,publishedAt 2>/dev/null || true)
          if [ -n "$RELEASE_JSON" ]; then
            RELEASE_EXISTS=true
            IS_DRAFT=$(echo "$RELEASE_JSON" | jq -r '.isDraft')
            PUBLISHED_AT=$(echo "$RELEASE_JSON" | jq -r '.publishedAt // ""')
            ASSETS=$(echo "$RELEASE_JSON" | jq -r '.assets[].name')
            echo "Release $TAG exists."
          fi

          if [ "$RELEASE_EXISTS" = "false" ]; then
            echo "Release $TAG does NOT exist."
          fi
          if [ "$RELEASE_EXISTS" = "true" ] && [ "$IS_DRAFT" = "false" ] && [ -n "$PUBLISHED_AT" ]; then
            RELEASE_PUBLISHED=true
          fi
          if [ "$RELEASE_PUBLISHED" = "false" ]; then
            echo "Release $TAG is NOT published."
          fi

          MISSING="["
          FIRST=true
          for platform in ubuntu-latest macos-latest windows-latest android; do
            MISSING_PLATFORM=false
            if [ "$RELEASE_PUBLISHED" = "false" ]; then
              MISSING_PLATFORM=true
            fi

            if [ "$RELEASE_PUBLISHED" = "true" ]; then
              KEYWORDS=""
              if [ "$platform" = "ubuntu-latest" ]; then
                KEYWORDS=".deb .AppImage"
              fi
              if [ "$platform" = "macos-latest" ]; then
                KEYWORDS=".dmg"
              fi
              if [ "$platform" = "windows-latest" ]; then
                KEYWORDS=".exe"
              fi
              if [ "$platform" = "android" ]; then
                KEYWORDS=".apk"
              fi

              PLATFORM_COMPLETE=true
              for keyword in $KEYWORDS; do
                if echo "$ASSETS" | grep -qi "$keyword"; then
                  echo "$platform asset found: $keyword"
                fi
                if ! echo "$ASSETS" | grep -qi "$keyword"; then
                  echo "Missing asset for $platform: $keyword"
                  PLATFORM_COMPLETE=false
                fi
              done
              if [ "$PLATFORM_COMPLETE" = "false" ]; then
                MISSING_PLATFORM=true
              fi
            fi

            if [ "$MISSING_PLATFORM" = "true" ]; then
              if [ "$FIRST" = true ]; then
                MISSING+="\"$platform\""
                FIRST=false
              else
                MISSING+=",\"$platform\""
              fi
            fi
          done
          MISSING+="]"
          echo "Release exists: $RELEASE_EXISTS"
          echo "Release draft: $IS_DRAFT"
          echo "Release published: $RELEASE_PUBLISHED"
          echo "Missing platforms: $MISSING"
          echo "release_exists=$RELEASE_EXISTS" >> $GITHUB_OUTPUT
          echo "release_published=$RELEASE_PUBLISHED" >> $GITHUB_OUTPUT
          echo "missing=$MISSING" >> $GITHUB_OUTPUT

  # ========== 第二个 if：未发布时，执行全量发布 ==========
  full-release:
    name: 全量发布
    needs: [check-version, check-release]
    if: needs.check-release.outputs.release_published == 'false'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.check-version.outputs.tag }}
      platforms: ${{ needs.check-release.outputs.missing_platforms }}
    secrets: inherit

  # ========== 第二个 if：已发布但有缺失平台时，只补发缺失包 ==========
  supplement-release:
    name: 补发缺失平台
    needs: [check-version, check-release]
    if: |
      needs.check-release.outputs.release_published == 'true' &&
      needs.check-release.outputs.missing_platforms != '[]'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.check-version.outputs.tag }}
      platforms: ${{ needs.check-release.outputs.missing_platforms }}
    secrets: inherit