name: CI

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ========== 检查版本与 tag 状态 ==========
  check-version:
    name: 检查版本状态
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: ${{ steps.version.outputs.TAG }}
      changed: ${{ steps.filter.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            version:
              - 'version.json'

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: 检查远程 tag 是否存在
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG exists."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG does NOT exist."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # ========== 日常编译检查（仅当 version.json 未变化时执行） ==========
  desktop-check:
    needs: check-version
    if: needs.check-version.outputs.changed == 'false'
    uses: ./.github/workflows/_build-desktop.yml

  mobile-check:
    needs: check-version
    if: needs.check-version.outputs.changed == 'false'
    uses: ./.github/workflows/_build-mobile.yml

  # ========== 打 tag（仅当 tag 不存在时执行，绝不删除已有 tag） ==========
  create-tag:
    name: 创建 tag
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 推送新 tag
        shell: bash
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  # ========== 检查缺失平台（当 tag 存在时执行） ==========
  check-missing:
    name: 检查缺失平台
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'true'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      missing_platforms: ${{ steps.check.outputs.missing }}
    steps:
      - name: 检查 Release 中缺少哪些平台的资产
        id: check
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          declare -A PLATFORM_KEY=(
            ["ubuntu-latest"]=".deb"
            ["macos-latest"]=".dmg"
            ["windows-latest"]=".exe"
            ["android"]=".apk"
            # ["ios"]=".ipa"   # 需要时可取消注释
          )
          MISSING="["
          FIRST=true
          # 目前检查的列表：三个桌面平台 + Android
          for platform in ubuntu-latest macos-latest windows-latest android; do
            KEYWORD="${PLATFORM_KEY[$platform]}"
            ASSETS=$(gh release view "$TAG" --repo $GITHUB_REPOSITORY --json assets --jq '.assets[].name' 2>/dev/null || echo "")
            if echo "$ASSETS" | grep -qi "$KEYWORD"; then
              echo "$platform asset found"
            else
              echo "Missing asset for $platform"
              if [ "$FIRST" = true ]; then
                MISSING+="\"$platform\""
                FIRST=false
              else
                MISSING+=",\"$platform\""
              fi
            fi
          done
          MISSING+="]"
          echo "Missing platforms: $MISSING"
          echo "missing=$MISSING" >> $GITHUB_OUTPUT

  # ========== 发布 / 补发（当检测到缺失平台时执行） ==========
  publish:
    name: 执行发布
    needs: [check-version, check-missing]
    if: needs.check-missing.outputs.missing_platforms != '[]'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.check-version.outputs.tag }}
    secrets: inherit