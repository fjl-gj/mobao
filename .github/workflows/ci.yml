name: CI

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  # ========== 检查版本与 tag 状态 ==========
  check-version:
    name: 检查版本状态
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: ${{ steps.version.outputs.TAG }}
      changed: ${{ steps.filter.outputs.version }}
      tag_exists: ${{ steps.check_tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            version:
              - 'version.json'

      - name: 读取版本号
        id: version
        run: |
          VERSION=$(jq -r '.version' version.json)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT

      - name: 检查远程 tag
        id: check_tag
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG exists."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG does NOT exist."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # ========== 编译检查（始终执行） ==========
  desktop-check:
    needs: check-version
    uses: ./.github/workflows/_build-desktop.yml

  mobile-check:
    needs: check-version
    uses: ./.github/workflows/_build-mobile.yml

  # ========== 打 tag（条件执行） ==========
  create-tag:
    name: 创建 tag
    needs: [check-version, desktop-check, mobile-check]
    if: |
      needs.check-version.outputs.changed == 'true' ||
      needs.check-version.outputs.tag_exists == 'false'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ needs.check-version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 推送新 tag
        shell: bash
        run: |
          CHANGED="${{ needs.check-version.outputs.changed }}"
          TAG="${{ needs.check-version.outputs.tag }}"
          EXISTS="${{ needs.check-version.outputs.tag_exists }}"

          if [[ "$EXISTS" == "true" && "$CHANGED" == "true" ]]; then
            echo "Removing old tag $TAG"
            git push origin --delete "$TAG"
          fi

          if [[ "$EXISTS" == "true" && "$CHANGED" == "false" ]]; then
            echo "Tag already present, nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  # ========== 检查 Release 是否已存在 ==========
  check-release:
    name: 检查 Release 状态
    needs: [check-version, create-tag]
    if: |
      needs.check-version.outputs.tag_exists == 'true' ||
      needs.create-tag.outputs.tag != ''
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      should_publish: ${{ steps.check.outputs.publish }}
    steps:
      - name: 查询 Release
        id: check
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          if gh release view "$TAG" --repo $GITHUB_REPOSITORY >/dev/null 2>&1; then
            echo "Release for $TAG already exists."
            echo "publish=false" >> $GITHUB_OUTPUT
          else
            echo "No Release for $TAG. Will publish."
            echo "publish=true" >> $GITHUB_OUTPUT
          fi

  # ========== 调用 release.yml 进行发布 ==========
  publish:
    name: 执行发布
    needs: [check-version, create-tag, check-release]
    if: needs.check-release.outputs.should_publish == 'true'
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.check-version.outputs.tag }}
    secrets: inherit